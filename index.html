<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日打卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f6fa;color:#1a1d23;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.app{width:100%;max-width:460px}

/* Dog */
.dog-card{background:#fff;border-radius:20px;padding:8px 0;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;position:relative;overflow:hidden;height:120px}
.dog-run-track{position:relative;width:100%;height:100%}
.dog-runner{position:absolute;top:12px;left:-10px;width:150px;height:100px;animation:runAcross 4s ease-in-out infinite;will-change:left,transform}
.dog-runner.happy{animation:runHappy .8s ease-in-out !important}
@keyframes runAcross{0%{left:-10px;transform:scaleX(1)}42%{left:calc(100% - 140px);transform:scaleX(1)}46%{left:calc(100% - 140px);transform:scaleX(1)}50%{left:calc(100% - 140px);transform:scaleX(-1)}92%{left:-10px;transform:scaleX(-1)}96%{left:-10px;transform:scaleX(-1)}100%{left:-10px;transform:scaleX(1)}}
@keyframes runHappy{0%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}15%{left:calc(50% - 75px);transform:translateY(-18px) scaleX(1)}30%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}45%{left:calc(50% - 75px);transform:translateY(-12px) scaleX(1)}60%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}100%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}}
.dog-svg-wrap{display:block;width:150px;height:100px}
@keyframes bodyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes tailWag{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@keyframes legL{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
@keyframes legR{0%,100%{transform:rotate(12deg)}50%{transform:rotate(-12deg)}}
@keyframes blink{0%,96%,100%{transform:scaleY(1)}97%,99%{transform:scaleY(.05)}}
.body-bob{animation:bodyBob .3s ease-in-out infinite;transform-origin:78px 65px}
.tail-group{animation:tailWag .2s ease-in-out infinite;transform-origin:108px 48px}
.leg-left{animation:legL .25s ease-in-out infinite;transform-origin:55px 82px}
.leg-right{animation:legR .25s ease-in-out infinite;transform-origin:78px 82px}
.leg-bl{animation:legR .25s ease-in-out infinite;transform-origin:92px 82px}
.leg-br{animation:legL .25s ease-in-out infinite;transform-origin:105px 82px}
.dog-greeting{font-size:13px;color:#7c818b;position:absolute;bottom:10px;left:0;right:0;text-align:center;pointer-events:none}

/* Clock */
.clock-card{background:#fff;border-radius:20px;padding:28px 28px 24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.clock-date{font-size:14px;color:#7c818b;letter-spacing:.3px;margin-bottom:6px}
.clock-time{font-size:48px;font-weight:600;letter-spacing:2px;font-variant-numeric:tabular-nums;color:#1a1d23;line-height:1.1}
.clock-time .seconds{font-size:24px;font-weight:400;color:#9ca3b0}

/* Items */
.items-card{background:#fff;border-radius:20px;padding:20px 20px 18px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.items-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.items-progress{font-size:13px;font-weight:500;color:#7c818b}
.items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.item-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px 12px;border:2px solid #eef0f4;border-radius:14px;background:#fafbfc;cursor:pointer;transition:all .2s ease;font-family:inherit;font-size:13px;color:#5a5f6b;font-weight:500;line-height:1.3;position:relative}
.item-btn:hover{border-color:#d0d4dc;background:#f5f6f8}
.item-btn.checked{border-color:#3b6eff;background:#f0f4ff;color:#3b6eff}
.item-btn .item-icon{font-size:26px;line-height:1;pointer-events:none}
.item-btn.checked .item-icon{animation:iconPop .3s ease}
@keyframes iconPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
/* Edit mode */
.item-btn .item-del{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:#ff4d4f;color:#fff;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2;transition:transform.15s}
.item-btn .item-del:hover{transform:scale(1.15)}
.item-btn .item-del.show{display:flex}
.add-item-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 8px 12px;border:2px dashed #d0d4dc;border-radius:14px;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;color:#9ca3b0;font-weight:500;transition:all.2s;line-height:1.3}
.add-item-btn:hover{border-color:#3b6eff;color:#3b6eff;background:#f0f4ff}
.items-header-btn{background:none;border:1px solid #e6e8ec;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;color:#7c818b;padding:4px 12px;font-weight:500;transition:all.15s}
.items-header-btn:hover{background:#f0f2f5;color:#3b6eff;border-color:#d0d4dc}
.items-header-btn.editing{background:#3b6eff;border-color:#3b6eff;color:#fff}

/* Add Dialog */
.dialog-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.dialog-overlay.show{display:flex}
.dialog{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.dialog-title{font-size:17px;font-weight:600;margin-bottom:16px}
.dialog-fld{margin-bottom:14px}
.dialog-fld label{display:block;font-size:13px;color:#7c818b;margin-bottom:4px}
.dialog-fld input{width:100%;padding:10px 12px;border:2px solid #eef0f4;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color.15s}
.dialog-fld input:focus{border-color:#3b6eff}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.emoji-opt{width:36px;height:36px;border:2px solid transparent;border-radius:8px;background:#f8f9fb;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all.15s}
.emoji-opt:hover{border-color:#d0d4dc;background:#f0f2f5}
.emoji-opt.sel{border-color:#3b6eff;background:#f0f4ff}
.dialog-acts{display:flex;gap:10px;margin-top:4px}
.dialog-acts button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all.15s}
.dialog-cancel{border:2px solid #eef0f4;background:#fff;color:#5a5f6b}
.dialog-cancel:hover{background:#f5f6f8}
.dialog-confirm{border:none;background:#3b6eff;color:#fff}
.dialog-confirm:hover{background:#2b5ae5}
.dialog-confirm:disabled{opacity:.4;cursor:default}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:opacity.3s;pointer-events:none}
.toast.show{opacity:1}

/* Stats */
.stats{display:flex;gap:10px;margin-bottom:16px}
.stat-item{flex:1;background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-num{font-size:24px;font-weight:700;color:#1a1d23}
.stat-label{font-size:12px;color:#9ca3b0;margin-top:2px}

/* Calendar */
.cal-card{background:#fff;border-radius:20px;padding:24px 24px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-title{font-size:17px;font-weight:600}
.cal-nav{display:flex;gap:4px}
.cal-nav button{background:none;border:1px solid #e6e8ec;border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;color:#5a5f6b;transition:all .15s;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:#f0f2f5;border-color:#d0d4dc}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.cal-weekday{font-size:12px;color:#9ca3b0;font-weight:500;padding-bottom:8px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:500;border-radius:50%;cursor:default;color:#1a1d23;position:relative}
.cal-day.other{color:#c8ccd4}
.cal-day.today{background:#3b6eff;color:#fff;font-weight:600}
.cal-day.has-check:not(.today):hover{background:#f0f2f5}
.cal-day.has-check{cursor:pointer}
.cal-day.today{cursor:pointer}
.cal-day .cal-bar{display:flex;gap:1.5px;margin-top:2px}
.cal-day .cal-dot{width:3px;height:3px;border-radius:50%;background:#34c759}
.cal-day.today .cal-dot{background:rgba(255,255,255,.7)}
.cal-day .cal-dot.empty{background:#e8edf5}

/* Day Detail */
.day-detail{display:none;background:#f8f9fb;border-radius:14px;padding:16px 20px;margin-top:12px}
.day-detail.show{display:block}
.day-detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.day-detail-date{font-size:15px;font-weight:600;color:#1a1d23}
.day-detail-close{background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3b0;padding:4px;line-height:1}
.day-detail-close:hover{color:#5a5f6b}
.day-detail-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;border-bottom:1px solid #eef0f4}
.day-detail-item:last-child{border-bottom:none}
.day-detail-item .dd-label{color:#5a5f6b;display:flex;align-items:center;gap:6px}
.day-detail-item .dd-status{font-weight:500;font-variant-numeric:tabular-nums}
.day-detail-item.checked .dd-status{color:#34c759}
.day-detail-item.missed .dd-status{color:#c8ccd4}

/* Records */
.records-card{background:#fff;border-radius:20px;margin-top:16px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.records-title{font-size:15px;font-weight:600;margin-bottom:12px}
.records-list{max-height:160px;overflow-y:auto}
.records-list::-webkit-scrollbar{width:4px}
.records-list::-webkit-scrollbar-thumb{background:#d0d4dc;border-radius:4px}
.record-item{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13px;border-bottom:1px solid #f0f2f5}
.record-item:last-child{border-bottom:none}
.record-date{color:#9ca3b0;min-width:80px}
.record-item-icon{font-size:16px}
.record-name{color:#5a5f6b;font-weight:500;min-width:40px}
.record-time{margin-left:auto;color:#1a1d23;font-weight:500;font-variant-numeric:tabular-nums}
.records-empty{color:#9ca3b0;font-size:14px;text-align:center;padding:20px 0}

@media(max-width:480px){body{padding:12px}.app{max-width:100%}.clock-card{padding:22px 16px 18px}.clock-time{font-size:38px}.clock-time .seconds{font-size:20px}.items-card{padding:16px 14px}.items-grid{grid-template-columns:repeat(3,1fr);gap:8px}.item-btn{padding:12px 6px 10px;font-size:12px}.item-btn .item-icon{font-size:22px}.cal-card{padding:16px 12px 14px}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Dog -->
  <div class="dog-card">
    <div class="dog-run-track">
      <div class="dog-runner" id="dogRunner">
        <div class="dog-svg-wrap">
          <svg viewBox="0 0 150 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g class="tail-group"><path d="M108 38 Q122 24 130 30 Q135 34 126 44 Q120 50 108 46Z" fill="#1a1a1a"/><path d="M126 26 Q132 22 134 28 Q135 32 130 36 Q128 32 126 26Z" fill="white"/></g>
            <g class="body-bob">
              <path class="leg-bl" d="M98 72 Q104 78 106 88 Q107 92 100 92 L92 92 Q88 88 90 80Z" fill="#1a1a1a"/>
              <path class="leg-br" d="M104 68 Q112 74 116 84 Q118 88 112 88 L104 88 Q100 84 102 76Z" fill="#1a1a1a"/>
              <ellipse cx="78" cy="56" rx="30" ry="15" fill="#1a1a1a"/>
              <path d="M50 56 Q46 46 52 40 Q58 36 64 40 Q68 44 64 62 Q58 70 50 56Z" fill="white"/>
              <path d="M48 44 Q54 38 62 40 Q66 43 62 48 Q56 52 50 48Z" fill="#f0f0f0" opacity=".9"/>
              <path class="leg-left" d="M52 66 Q52 74 48 84 Q47 88 53 88 L60 88 Q62 84 60 78 Q58 70 58 66Z" fill="#f5f5f5"/>
              <path class="leg-right" d="M64 66 Q66 74 64 84 Q63 88 69 88 L76 88 Q78 84 76 78 Q74 70 72 66Z" fill="#f5f5f5"/>
              <ellipse cx="44" cy="40" rx="15" ry="13" fill="white"/>
              <path d="M34 34 Q30 30 34 28 Q40 26 44 30 Q42 36 38 38 Q34 38 34 34Z" fill="#1a1a1a"/>
              <path d="M50 34 Q54 30 52 28 Q48 26 44 30 Q44 36 48 38Q50 38 50 34Z" fill="#1a1a1a"/>
              <path d="M42 32 Q44 30 46 32 L46 48 Q44 50 42 48Z" fill="white"/>
              <ellipse cx="32" cy="46" rx="4.5" ry="3" fill="#1a1a1a"/>
              <ellipse cx="32" cy="45.2" rx="2" ry="1" fill="#333"/>
              <circle cx="38" cy="36" r="2.5" fill="#1a1a1a"/><circle cx="37.5" cy="35.5" r=".9" fill="white"/>
              <circle cx="48" cy="36" r="2.5" fill="#1a1a1a"/><circle cx="47.5" cy="35.5" r=".9" fill="white"/>
              <g class="dog-eye-inner"><circle cx="48" cy="36" r="2.5" fill="#1a1a1a"/><circle cx="47.5" cy="35.5" r=".9" fill="white"/></g>
              <path d="M28 50 Q32 52 36 50" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
              <ellipse cx="33" cy="53" rx="2.5" ry="3.5" fill="#ff7b89" opacity=".8"/>
              <path d="M28 36 Q22 26 28 22 Q34 20 34 28 Q32 34 28 36Z" fill="#1a1a1a"/>
              <path d="M52 28 Q58 24 60 28 Q60 34 56 38 Q54 36 52 28Z" fill="#1a1a1a"/>
            </g>
          </svg>
        </div>
      </div>
      <div class="dog-greeting" id="dogGreeting">今天也要加油哟 🐾</div>
    </div>
  </div>

  <!-- Clock -->
  <div class="clock-card">
    <div class="clock-date" id="clockDate"></div>
    <div class="clock-time">
      <span id="clockHour">--</span>:<span id="clockMin">--</span>
      <span class="seconds" id="clockSec">--</span>
    </div>
  </div>

  <!-- Items -->
  <div class="items-card">
    <div class="items-title">
      <span>今日待办</span>
      <div><button class="items-header-btn" id="editBtn" onclick="toggleEdit()">编辑</button></div>
    </div>
    <div class="items-grid" id="itemsGrid"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-item"><div class="stat-num" id="statDay">0/0</div><div class="stat-label">今日完成</div></div>
    <div class="stat-item"><div class="stat-num" id="statStreak">0</div><div class="stat-label">连续达标</div></div>
    <div class="stat-item"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总打卡</div></div>
  </div>

  <!-- Calendar -->
  <div class="cal-card">
    <div class="cal-header">
      <div class="cal-title" id="calTitle">2026 年 6 月</div>
      <div class="cal-nav">
        <button onclick="prevMonth()">‹</button>
        <button onclick="nextMonth()">›</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="day-detail" id="dayDetail">
      <div class="day-detail-header">
        <span class="day-detail-date" id="dayDetailDate"></span>
        <button class="day-detail-close" onclick="closeDayDetail()">✕</button>
      </div>
      <div id="dayDetailItems"></div>
    </div>
  </div>

  <!-- Records -->
  <div class="records-card">
    <div class="records-title">打卡记录</div>
    <div class="records-list" id="recordsList"></div>
  </div>
</div>

<!-- Add Item Dialog -->
<div class="dialog-overlay" id="addDialog">
  <div class="dialog">
    <div class="dialog-title">添加打卡项目</div>
    <div class="dialog-fld">
      <label>项目名称</label>
      <input id="dialogName" type="text" placeholder="例如：阅读" maxlength="10" oninput="onDialogInput()">
    </div>
    <div class="dialog-fld">
      <label>选择图标</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="dialog-acts">
      <button class="dialog-cancel" onclick="closeAddDialog()">取消</button>
      <button class="dialog-confirm" id="dialogConfirm" disabled onclick="addItem()">添加</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Item Management ──────────────────────────────────────
const DEFAULT_ITEMS=[
  {key:"健身",icon:"🏋️",label:"健身"},
  {key:"喝水",icon:"💧",label:"喝水"},
  {key:"学习",icon:"📚",label:"学习"},
  {key:"睡觉",icon:"😴",label:"睡觉"},
  {key:"遛狗",icon:"🐕",label:"遛狗"},
  {key:"吃早餐",icon:"🥐",label:"吃早餐"},
]
const ITEMS_KEY="checkin_items_v2"
let ITEMS=[]
let EDIT_MODE=false

function loadItems(){
  try{
    const s=localStorage.getItem(ITEMS_KEY)
    if(s){ITEMS=JSON.parse(s);return}
  }catch(e){}
  ITEMS=DEFAULT_ITEMS.map(i=>({...i}))
}
function saveItems(){
  localStorage.setItem(ITEMS_KEY,JSON.stringify(ITEMS))
  renderItems()
  calcStats()
  renderCal()
  renderRecords()
}
function genKey(name){
  return name.trim().toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,'')
}
function addItem(){
  const name=document.getElementById("dialogName").value.trim()
  if(!name)return
  const selEmoji=document.querySelector(".emoji-opt.sel")
  const icon=selEmoji?selEmoji.textContent:"✓"
  const key=genKey(name)+"_"+Date.now()
  ITEMS.push({key,icon,label:name})
  saveItems()
  closeAddDialog()
  showToast("已添加「"+name+"」")
}
function deleteItem(key,label){
  if(!confirm("删除「"+label+"」吗？打卡记录会保留，但项目将从列表中移除。"))return
  ITEMS=ITEMS.filter(i=>i.key!==key)
  saveItems()
  showToast("已删除「"+label+"」")
}

// ── Edit Mode ────────────────────────────────────────────
function toggleEdit(){
  EDIT_MODE=!EDIT_MODE
  const btn=document.getElementById("editBtn")
  btn.textContent=EDIT_MODE?"完成":"编辑"
  btn.classList.toggle("editing",EDIT_MODE)
  renderItems()
}

// ── Add Dialog ───────────────────────────────────────────
const EMOJIS="🏋️ 💧 📚 😴 🐕 🥐 📖 🎯 💪 🏃 🧘 🎨 🎵 🖋️ 📷 🎮 🧹 🌱 ❤️ 🎉 🔥 ⚡ ☕ 🍎 🥗 🍳 🏡 🎬 ✈️ 🛒 🧠 💼 🌿 🎵 🎸".split(" ")
let _selEmoji=null

function showAddDialog(){
  _selEmoji=null
  document.getElementById("dialogName").value=""
  document.getElementById("dialogConfirm").disabled=true
  document.getElementById("addDialog").classList.add("show")
  const g=document.getElementById("emojiGrid")
  g.innerHTML=""
  EMOJIS.forEach(e=>{
    const el=document.createElement("span")
    el.className="emoji-opt"
    el.textContent=e
    el.onclick=()=>{
      document.querySelectorAll(".emoji-opt").forEach(x=>x.classList.remove("sel"))
      el.classList.add("sel")
      _selEmoji=e
      onDialogInput()
    }
    g.appendChild(el)
  })
  setTimeout(()=>document.getElementById("dialogName").focus(),100)
}
function closeAddDialog(){
  document.getElementById("addDialog").classList.remove("show")
}
function onDialogInput(){
  const name=document.getElementById("dialogName").value.trim()
  document.getElementById("dialogConfirm").disabled=!name
}

// ── Toast ────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById("toast")
  t.textContent=msg
  t.classList.add("show")
  clearTimeout(t._timer)
  t._timer=setTimeout(()=>t.classList.remove("show"),2500)
}

// ── Data ─────────────────────────────────────────────────
const STORAGE_KEY="checkin_records_v2"
let records=[]
try{records=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch(e){records=[]}
let calYear,calMonth

function pad(n){return String(n).padStart(2,"0")}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function fmtTime(d){return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())}
function getDay(dateStr){return records.find(r=>r.date===dateStr)||null}
function ensureToday(){
  const ds=todayStr()
  let day=getDay(ds)
  if(!day){day={date:ds,checks:{}};records.push(day)}
  return day
}

// ── Toggle Check ─────────────────────────────────────────
function toggleItem(key){
  const day=ensureToday()
  if(day.checks[key]){delete day.checks[key]}else{day.checks[key]=fmtTime(new Date())}
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records))
  renderItems()
  calcStats()
  renderCal()
  renderRecords()
  // happy dog
  const runner=document.getElementById("dogRunner")
  runner.classList.remove("happy")
  void runner.offsetWidth
  runner.classList.add("happy")
  const msgs=["边牧为你点赞！🐾","好棒，继续坚持！","今天也超棒！","加油加油！✧"]
  document.getElementById("dogGreeting").innerHTML='<span style="color:#3b6eff;font-weight:600">'+msgs[Math.floor(Math.random()*msgs.length)]+'</span>'
  clearTimeout(window._greetTimer)
  window._greetTimer=setTimeout(()=>{
    const n=new Date().getHours()
    let t="今天也要加油哟"
    if(n<6)t="这么早！边牧都惊了 🐶"
    else if(n<9)t="早安！新的一天开始啦 ☀️"
    else if(n<12)t="上午好，保持专注！"
    else if(n<14)t="午休时间到，休息一下~"
    else if(n<18)t="下午继续努力！"
    else t="晚上好，今天辛苦啦 🌙"
    document.getElementById("dogGreeting").innerHTML=t+' <span style="color:#3b6eff;font-weight:600">🐾</span>'
  },2500)
  showDayDetail(todayStr())
}

// ── Render Items ─────────────────────────────────────────
function renderItems(){
  const day=getDay(todayStr())
  const grid=document.getElementById("itemsGrid")
  grid.innerHTML=""
  let count=0
  ITEMS.forEach(item=>{
    const checked=day&&day.checks[item.key]
    if(checked)count++
    const btn=document.createElement("button")
    btn.className="item-btn"+(checked?" checked":"")
    btn.innerHTML='<span class="item-icon">'+item.icon+'</span>'+item.label
    if(EDIT_MODE){
      const del=document.createElement("span")
      del.className="item-del show"
      del.textContent="✕"
      del.onclick=(e)=>{e.stopPropagation();deleteItem(item.key,item.label)}
      btn.appendChild(del)
    }
    btn.onclick=()=>EDIT_MODE||toggleItem(item.key)
    grid.appendChild(btn)
  })
  if(EDIT_MODE){
    const addBtn=document.createElement("button")
    addBtn.className="add-item-btn"
    addBtn.innerHTML='<span style="font-size:22px">+</span>添加项目'
    addBtn.onclick=showAddDialog
    grid.appendChild(addBtn)
  }
  const total=ITEMS.length
  document.getElementById("itemsProgress").textContent=count+" / "+total
  document.getElementById("statDay").textContent=count+"/"+total
  // Update progress display
}

// ── Clock ────────────────────────────────────────────────
function updateClock(){
  const d=new Date()
  const w=["日","一","二","三","四","五","六"]
  document.getElementById("clockDate").textContent=d.getFullYear()+" 年 "+(d.getMonth()+1)+" 月 "+d.getDate()+" 日 星期"+w[d.getDay()]
  document.getElementById("clockHour").textContent=pad(d.getHours())
  document.getElementById("clockMin").textContent=pad(d.getMinutes())
  document.getElementById("clockSec").textContent=pad(d.getSeconds())
}
updateClock()
setInterval(updateClock,1000)

// ── Stats ────────────────────────────────────────────────
function calcStats(){
  const checkedCount=records.reduce((sum,d)=>sum+Object.keys(d.checks).length,0)
  document.getElementById("statTotal").textContent=checkedCount
  let streak=0
  const d=new Date()
  d.setDate(d.getDate()-1)
  const todayDay=getDay(todayStr())
  if(todayDay&&Object.keys(todayDay.checks).length===ITEMS.length)streak=1
  while(true){
    const ds=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
    const day=getDay(ds)
    if(day&&Object.keys(day.checks).length===ITEMS.length){
      if(!(streak===1&&ds===todayStr())){streak++}
    }else{break}
    d.setDate(d.getDate()-1)
  }
  document.getElementById("statStreak").textContent=streak
}

// ── Calendar ─────────────────────────────────────────────
function initCal(){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();renderCal()}
function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCal()}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCal()}
function renderCal(){
  document.getElementById("calTitle").textContent=calYear+" 年 "+(calMonth+1)+" 月"
  const g=document.getElementById("calGrid");g.innerHTML=""
  ;["日","一","二","三","四","五","六"].forEach(w=>{const e=document.createElement("div");e.className="cal-weekday";e.textContent=w;g.appendChild(e)})
  const first=new Date(calYear,calMonth,1).getDay()
  const days=new Date(calYear,calMonth+1,0).getDate()
  const today=todayStr()
  const pdays=new Date(calYear,calMonth,0).getDate()
  for(let i=first-1;i>=0;i--){const e=document.createElement("div");e.className="cal-day other";e.textContent=pdays-i;g.appendChild(e)}
  const totalItems=ITEMS.length
  for(let d=1;d<=days;d++){
    const ds=calYear+"-"+pad(calMonth+1)+"-"+pad(d)
    const day=getDay(ds)
    const e=document.createElement("div");e.className="cal-day"
    if(ds===today)e.classList.add("today")
    const n=day?Object.keys(day.checks).length:0
    if(n>0){e.classList.add("has-check");e.onclick=()=>showDayDetail(ds)}
    if(ds===today)e.onclick=()=>showDayDetail(ds)
    const txt=document.createElement("span");txt.textContent=d;e.appendChild(txt)
    if(n>0){
      const bar=document.createElement("div");bar.className="cal-bar"
      for(let i=0;i<totalItems;i++){
        const dot=document.createElement("span");dot.className="cal-dot"+(i>=n?" empty":"");bar.appendChild(dot)
      }
      e.appendChild(bar)
    }
    g.appendChild(e)
  }
  const r=(7-g.children.length%7)%7
  for(let i=1;i<=r;i++){const e=document.createElement("div");e.className="cal-day other";e.textContent=i;g.appendChild(e)}
}

// ── Day Detail ───────────────────────────────────────────
function showDayDetail(dateStr){
  const day=getDay(dateStr)
  document.getElementById("dayDetailDate").textContent=dateStr
  const container=document.getElementById("dayDetailItems");container.innerHTML=""
  const allKeys=new Set()
  if(day)Object.keys(day.checks).forEach(k=>allKeys.add(k))
  ITEMS.forEach(item=>{
    if(allKeys.has(item.key))allKeys.delete(item.key)
    const checked=day&&day.checks[item.key]
    const el=document.createElement("div");el.className="day-detail-item"+(checked?" checked":" missed")
    el.innerHTML='<span class="dd-label">'+item.icon+' '+item.label+'</span><span class="dd-status">'+(checked?'✅ '+day.checks[item.key]:'❌')+'</span>'
    container.appendChild(el)
  })
  // Show deleted items that still have check-ins on this date
  allKeys.forEach(k=>{
    const el=document.createElement("div");el.className="day-detail-item checked"
    el.innerHTML='<span class="dd-label">'+k+'</span><span class="dd-status">✅ '+day.checks[k]+'</span>'
    container.appendChild(el)
  })
  document.getElementById("dayDetail").classList.add("show")
}
function closeDayDetail(){document.getElementById("dayDetail").classList.remove("show")}

// ── Records ──────────────────────────────────────────────
function renderRecords(){
  const l=document.getElementById("recordsList");l.innerHTML=""
  const all=[]
  records.forEach(d=>{
    Object.entries(d.checks).forEach(([key,time])=>all.push({date:d.date,item:key,time}))
  })
  if(!all.length){l.innerHTML='<div class="records-empty">暂无打卡记录</div>';return}
  all.sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time))
  all.slice(0,25).forEach(r=>{
    const item=ITEMS.find(i=>i.key===r.item)
    const el=document.createElement("div");el.className="record-item"
    el.innerHTML='<span class="record-date">'+r.date+'</span><span class="record-item-icon">'+(item?item.icon:"✓")+'</span><span class="record-name">'+(item?item.label:r.item)+'</span><span class="record-time">'+r.time+'</span>'
    l.appendChild(el)
  })
}
