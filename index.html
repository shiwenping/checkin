<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日打卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f6fa;color:#1a1d23;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.app{width:100%;max-width:460px}

/* Splash */
.splash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity.5s ease;pointer-events:all}
.splash.hide{opacity:0;pointer-events:none}
.splash-dog{width:160px;height:110px}
@keyframes splashRunIn{0%{transform:translateX(-100%) scaleX(1)}55%{transform:translateX(0) scaleX(1)}60%{transform:translateX(8px) scaleX(1)}65%{transform:translateX(0) scaleX(1)}100%{transform:translateX(0) scaleX(1)}}
@keyframes splashJump{0%,100%{transform:translateY(0)}20%{transform:translateY(-14px) scaleY(1.02)}35%{transform:translateY(-6px)}50%{transform:translateY(-10px) scaleY(1.01)}65%{transform:translateY(-3px)}80%{transform:translateY(-6px)}}
.splash-dog-anim{animation:splashRunIn .9s ease-out forwards,splashJump .9s ease-in-out .85s forwards}
.splash-text{font-size:24px;font-weight:700;color:#1a1d23;margin-top:18px;opacity:0;animation:fadeUp .5s ease-out 1.6s forwards}
.splash-sub{font-size:14px;color:#9ca3b0;margin-top:8px;opacity:0;animation:fadeUp .5s ease-out 1.9s forwards}
.splash-dots{display:flex;gap:5px;margin-top:16px;opacity:0;animation:fadeUp .5s ease-out 2.1s forwards}
.splash-dots span{width:5px;height:5px;border-radius:50%;background:#3b6eff;animation:dotBounce 1s ease-in-out infinite}
.splash-dots span:nth-child(2){animation-delay:.15s}
.splash-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.dog-card{background:#fff;border-radius:20px;padding:8px 0;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;position:relative;overflow:hidden;height:120px}
.dog-run-track{position:relative;width:100%;height:100%}
.dog-runner{position:absolute;top:12px;left:-10px;width:150px;height:100px;animation:runAcross 4s ease-in-out infinite;will-change:left,transform}
.dog-runner.happy{animation:runHappy .8s ease-in-out !important}
@keyframes runAcross{0%{left:-10px;transform:scaleX(1)}42%{left:calc(100% - 140px);transform:scaleX(1)}46%{left:calc(100% - 140px);transform:scaleX(1)}50%{left:calc(100% - 140px);transform:scaleX(-1)}92%{left:-10px;transform:scaleX(-1)}96%{left:-10px;transform:scaleX(-1)}100%{left:-10px;transform:scaleX(1)}}
@keyframes runHappy{0%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}15%{left:calc(50% - 75px);transform:translateY(-18px) scaleX(1)}30%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}45%{left:calc(50% - 75px);transform:translateY(-12px) scaleX(1)}60%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}100%{left:calc(50% - 75px);transform:translateY(0) scaleX(1)}}
.dog-svg-wrap{display:block;width:150px;height:100px}
@keyframes bodyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes tailWag{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@keyframes legL{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
@keyframes legR{0%,100%{transform:rotate(12deg)}50%{transform:rotate(-12deg)}}
@keyframes blink{0%,96%,100%{transform:scaleY(1)}97%,99%{transform:scaleY(.05)}}
.body-bob{animation:bodyBob .3s ease-in-out infinite;transform-origin:78px 65px}
.tail-group{animation:tailWag .2s ease-in-out infinite;transform-origin:108px 48px}
.leg-left{animation:legL .25s ease-in-out infinite;transform-origin:55px 82px}
.leg-right{animation:legR .25s ease-in-out infinite;transform-origin:78px 82px}
.leg-bl{animation:legR .25s ease-in-out infinite;transform-origin:92px 82px}
.leg-br{animation:legL .25s ease-in-out infinite;transform-origin:105px 82px}
.dog-greeting{font-size:13px;color:#7c818b;position:absolute;bottom:10px;left:0;right:0;text-align:center;pointer-events:none}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;min-height:36px}
.top-bar .app-title{font-size:18px;font-weight:700;color:#1a1d23}
.auth-btn{background:#fff;border:1px solid #e6e8ec;border-radius:10px;padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;color:#5a5f6b;font-weight:500;transition:all.15s;display:flex;align-items:center;gap:6px}
.auth-btn:hover{background:#f5f6f8;border-color:#3b6eff;color:#3b6eff}
.auth-btn.logout-btn{color:#e8453c;border-color:#fde8e8;background:#fff5f5}
.auth-btn.logout-btn:hover{background:#fee;border-color:#e8453c}
.user-avatar{width:22px;height:22px;border-radius:50%;background:#3b6eff;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.auth-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.auth-overlay.show{display:flex}
.auth-box{background:#fff;border-radius:24px;padding:28px;width:100%;max-width:380px;box-shadow:0 16px 48px rgba(0,0,0,.15);position:relative}
.auth-box h2{font-size:20px;font-weight:700;margin-bottom:4px}
.auth-box .auth-sub{font-size:14px;color:#9ca3b0;margin-bottom:20px}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:#f4f6fa;border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:8px;text-align:center;border:none;border-radius:8px;background:transparent;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;color:#7c818b;transition:all.15s}
.auth-tab.active{background:#fff;color:#1a1d23;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.auth-fld{margin-bottom:14px}
.auth-fld label{display:block;font-size:13px;color:#7c818b;margin-bottom:4px}
.auth-fld input{width:100%;padding:12px 14px;border:2px solid #eef0f4;border-radius:12px;font-size:15px;font-family:inherit;outline:none;transition:border-color.15s}
.auth-fld input:focus{border-color:#3b6eff}
.auth-submit{width:100%;padding:12px;border:none;border-radius:12px;background:#3b6eff;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background.15s;margin-top:4px}
.auth-submit:hover{background:#2b5ae5}
.auth-submit:disabled{opacity:.5;cursor:default}
.auth-error{font-size:13px;color:#e8453c;margin-top:10px;display:none}
.auth-error.show{display:block}
.auth-success{font-size:13px;color:#34c759;margin-top:10px;display:none}
.auth-success.show{display:block}
.auth-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;border-radius:50%;background:#f4f6fa;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#7c818b;transition:all.15s}
.auth-close:hover{background:#e6e8ec}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.85);z-index:150;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.loading-spinner{width:36px;height:36px;border:3px solid #eef0f4;border-top-color:#3b6eff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:#7c818b;font-weight:500}
.clock-card{background:#fff;border-radius:20px;padding:28px 28px 24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.clock-date{font-size:14px;color:#7c818b;letter-spacing:.3px;margin-bottom:6px}
.clock-time{font-size:48px;font-weight:600;letter-spacing:2px;font-variant-numeric:tabular-nums;color:#1a1d23;line-height:1.1}
.clock-time .seconds{font-size:24px;font-weight:400;color:#9ca3b0}
.items-card{background:#fff;border-radius:20px;padding:20px 20px 18px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.items-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.items-progress{font-size:13px;font-weight:500;color:#7c818b}
.items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.item-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px 12px;border:2px solid #eef0f4;border-radius:14px;background:#fafbfc;cursor:pointer;transition:all .2s ease;font-family:inherit;font-size:13px;color:#5a5f6b;font-weight:500;line-height:1.3;position:relative}
.item-btn:hover{border-color:#d0d4dc;background:#f5f6f8}
.item-btn.checked{border-color:#3b6eff;background:#f0f4ff;color:#3b6eff}
.item-btn .item-icon{font-size:26px;line-height:1;pointer-events:none}
.item-btn.checked .item-icon{animation:iconPop .3s ease}
@keyframes iconPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.item-btn .item-del{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:#ff4d4f;color:#fff;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2;transition:transform.15s}
.item-btn .item-del:hover{transform:scale(1.15)}
.item-btn .item-del.show{display:flex}
.add-item-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 8px 12px;border:2px dashed #d0d4dc;border-radius:14px;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;color:#9ca3b0;font-weight:500;transition:all.2s;line-height:1.3}
.add-item-btn:hover{border-color:#3b6eff;color:#3b6eff;background:#f0f4ff}
.items-header-btn{background:none;border:1px solid #e6e8ec;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;color:#7c818b;padding:4px 12px;font-weight:500;transition:all.15s}
.items-header-btn:hover{background:#f0f2f5;color:#3b6eff;border-color:#d0d4dc}
.items-header-btn.editing{background:#3b6eff;border-color:#3b6eff;color:#fff}
.dialog-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.dialog-overlay.show{display:flex}
.dialog{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.dialog-title{font-size:17px;font-weight:600;margin-bottom:16px}
.dialog-fld{margin-bottom:14px}
.dialog-fld label{display:block;font-size:13px;color:#7c818b;margin-bottom:4px}
.dialog-fld input{width:100%;padding:10px 12px;border:2px solid #eef0f4;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color.15s}
.dialog-fld input:focus{border-color:#3b6eff}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.emoji-opt{width:36px;height:36px;border:2px solid transparent;border-radius:8px;background:#f8f9fb;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all.15s}
.emoji-opt:hover{border-color:#d0d4dc;background:#f0f2f5}
.emoji-opt.sel{border-color:#3b6eff;background:#f0f4ff}
.dialog-acts{display:flex;gap:10px;margin-top:4px}
.dialog-acts button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all.15s}
.dialog-cancel{border:2px solid #eef0f4;background:#fff;color:#5a5f6b}
.dialog-cancel:hover{background:#f5f6f8}
.dialog-confirm{border:none;background:#3b6eff;color:#fff}
.dialog-confirm:hover{background:#2b5ae5}
.dialog-confirm:disabled{opacity:.4;cursor:default}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;z-index:300;opacity:0;transition:opacity.3s;pointer-events:none}
.toast.show{opacity:1}
.stats{display:flex;gap:10px;margin-bottom:16px}
.stat-item{flex:1;background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-num{font-size:24px;font-weight:700;color:#1a1d23}
.stat-label{font-size:12px;color:#9ca3b0;margin-top:2px}
.cal-card{background:#fff;border-radius:20px;padding:24px 24px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-title{font-size:17px;font-weight:600}
.cal-nav{display:flex;gap:4px}
.cal-nav button{background:none;border:1px solid #e6e8ec;border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;color:#5a5f6b;transition:all .15s;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:#f0f2f5;border-color:#d0d4dc}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.cal-weekday{font-size:12px;color:#9ca3b0;font-weight:500;padding-bottom:8px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:500;border-radius:50%;cursor:default;color:#1a1d23;position:relative}
.cal-day.other{color:#c8ccd4}
.cal-day.today{background:#3b6eff;color:#fff;font-weight:600}
.cal-day.has-check:not(.today):hover{background:#f0f2f5}
.cal-day.has-check{cursor:pointer}
.cal-day.today{cursor:pointer}
.cal-day .cal-bar{display:flex;gap:1.5px;margin-top:2px}
.cal-day .cal-dot{width:3px;height:3px;border-radius:50%;background:#34c759}
.cal-day.today .cal-dot{background:rgba(255,255,255,.7)}
.cal-day .cal-dot.empty{background:#e8edf5}
.day-detail{display:none;background:#f8f9fb;border-radius:14px;padding:16px 20px;margin-top:12px}
.day-detail.show{display:block}
.day-detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.day-detail-date{font-size:15px;font-weight:600;color:#1a1d23}
.day-detail-close{background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3b0;padding:4px;line-height:1}
.day-detail-close:hover{color:#5a5f6b}
.day-detail-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;border-bottom:1px solid #eef0f4}
.day-detail-item:last-child{border-bottom:none}
.day-detail-item .dd-label{color:#5a5f6b;display:flex;align-items:center;gap:6px}
.day-detail-item .dd-status{font-weight:500;font-variant-numeric:tabular-nums}
.day-detail-item.checked .dd-status{color:#34c759}
.day-detail-item.missed .dd-status{color:#c8ccd4}
.records-card{background:#fff;border-radius:20px;margin-top:16px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.records-title{font-size:15px;font-weight:600;margin-bottom:12px}
.records-list{max-height:160px;overflow-y:auto}
.records-list::-webkit-scrollbar{width:4px}
.records-list::-webkit-scrollbar-thumb{background:#d0d4dc;border-radius:4px}
.record-item{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13px;border-bottom:1px solid #f0f2f5}
.record-item:last-child{border-bottom:none}
.record-date{color:#9ca3b0;min-width:80px}
.record-item-icon{font-size:16px}
.record-name{color:#5a5f6b;font-weight:500;min-width:40px}
.record-time{margin-left:auto;color:#1a1d23;font-weight:500;font-variant-numeric:tabular-nums}
.records-empty{color:#9ca3b0;font-size:14px;text-align:center;padding:20px 0}
@media(max-width:480px){body{padding:12px}.app{max-width:100%}.clock-card{padding:22px 16px 18px}.clock-time{font-size:38px}.clock-time .seconds{font-size:20px}.items-card{padding:16px 14px}.items-grid{grid-template-columns:repeat(3,1fr);gap:8px}.item-btn{padding:12px 6px 10px;font-size:12px}.item-btn .item-icon{font-size:22px}.cal-card{padding:16px 12px 14px}.auth-box{padding:24px 20px}}
.music-btn{position:fixed;bottom:24px;left:50%;margin-left:80px;width:40px;height:40px;border-radius:50%;border:2px solid #eef0f4;background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all.2s;color:#5a5f6b}.music-btn:hover{background:#f5f6f8;border-color:#3b6eff;color:#3b6eff}.music-btn.playing{border-color:#3b6eff;background:#f0f4ff;color:#3b6eff}.music-btn.muted{opacity:.6}
.badges-card{background:#fff;border-radius:20px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-top:16px}.badges-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}.badges-grid{display:flex;gap:10px;flex-wrap:wrap}.badge-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 14px;border-radius:14px;background:#f8f9fb;text-align:center;flex:1;min-width:100px;transition:all.3s}.badge-item.earned{background:#fffbe6;border:2px solid #ffd700;box-shadow:0 2px 8px rgba(255,215,0,.2)}.badge-item.locked{opacity:.45}.badge-icon{font-size:36px;line-height:1}.badge-locked-icon{font-size:36px;filter:grayscale(1);opacity:.5}.badge-name{font-size:13px;font-weight:600;color:#1a1d23;line-height:1.3}.badge-desc{font-size:11px;color:#9ca3b0;line-height:1.3}.badge-date{font-size:10px;color:#b8860b;margin-top:2px}.badges-card{background:#fff;border-radius:20px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-top:16px}.badges-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}.badges-grid{display:flex;gap:10px;flex-wrap:wrap}.badge-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 14px;border-radius:14px;background:#f8f9fb;text-align:center;flex:1;min-width:100px}.badge-item.earned{background:#fffbe6;border:2px solid #ffd700}.badge-item.locked{opacity:.45}.badge-icon{font-size:36px;line-height:1}.badge-locked-icon{font-size:36px;filter:grayscale(1);opacity:.5}.badge-name{font-size:13px;font-weight:600;color:#1a1d23}.badge-desc{font-size:11px;color:#9ca3b0}.badge-date{font-size:10px;color:#b8860b;margin-top:2px}</style>
</head>
<body>

  <div class="splash-dog splash-dog-anim">

async function logout(){if(!confirm('退出登录？本地数据会保留，下次登录后自动同步。'))return;AUTH.signOut();showToast('已退出登录')}
async function syncDataFromCloud(){
  if(!currentUser)return;syncInProgress=true;const uid=currentUser.uid;
  try{
    const d=await DB.collection('users').doc(uid).collection('data').doc('items').get();
    if(d.exists){const ci=d.data().list||[];if(ci.length>0){const lh=localStorage.getItem(ITEMS_KEY);if(!lh||lh===JSON.stringify(DEFAULT_ITEMS)){ITEMS=ci}}}
  }catch(e){}
  try{
    const snap=await DB.collection('users').doc(uid).collection('records').get();
    const cr=[];snap.forEach(doc=>{if(doc.id!=='__items__')cr.push({date:doc.id,checks:doc.data().checks||{}})});
    if(cr.length>0){
      const today=todayStr();const lm={};records.forEach(r=>lm[r.date]=r.checks);const merged={};
      cr.forEach(r=>merged[r.date]=r.checks);if(lm[today])merged[today]=lm[today];
      records.forEach(r=>{if(!merged[r.date])merged[r.date]=r.checks});
      records=Object.entries(merged).map(([d,c])=>({date:d,checks:c}));
    }
  }catch(e){}
  try{
    const d=await DB.collection('users').doc(uid).collection('data').doc('items').get();
    if(!d.exists&&ITEMS.length>0)await DB.collection('users').doc(uid).collection('data').doc('items').set({list:ITEMS});
  }catch(e){}
  await pushRecordsToCloud();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));localStorage.setItem(ITEMS_KEY,JSON.stringify(ITEMS));renderAll();syncInProgress=false;
}
async function pushRecordsToCloud(){if(!currentUser)return;try{const b=DB.batch();records.forEach(r=>{b.set(DB.collection('users').doc(currentUser.uid).collection('records').doc(r.date),{checks:r.checks},{merge:true})});await b.commit()}catch(e){}}
async function pushItemsToCloud(){if(!currentUser)return;try{await DB.collection('users').doc(currentUser.uid).collection('data').doc('items').set({list:ITEMS})}catch(e){}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(records));renderItems();calcStats();renderCal();renderRecords();checkBadges();if(currentUser&&!syncInProgress){pushRecordsToCloud();pushItemsToCloud()}}
const DEFAULT_ITEMS=[{key:"健身",icon:"🏋️",label:"健身"},{key:"喝水",icon:"💧",label:"喝水"},{key:"学习",icon:"📚",label:"学习"},{key:"睡觉",icon:"😴",label:"睡觉"},{key:"遛狗",icon:"🐕",label:"遛狗"},{key:"吃早餐",icon:"🥐",label:"吃早餐"}];
const ITEMS_KEY="checkin_items_v2";let ITEMS=[];let EDIT_MODE=false;
function loadItems(){try{const s=localStorage.getItem(ITEMS_KEY);if(s){ITEMS=JSON.parse(s);return}}catch(e){}ITEMS=DEFAULT_ITEMS.map(i=>({...i}))}
function saveItems(){localStorage.setItem(ITEMS_KEY,JSON.stringify(ITEMS));save()}
function genKey(n){return n.trim().toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g,'')}
function addItem(){const name=document.getElementById('dialogName').value.trim();if(!name)return;const sel=document.querySelector('.emoji-opt.sel');const icon=sel?sel.textContent:'✓';const key=genKey(name)+'_'+Date.now();ITEMS.push({key,icon,label:name});saveItems();closeAddDialog();showToast('已添加「'+name+'」')}
function deleteItem(key,label){if(!confirm('删除「'+label+'」吗？打卡记录会保留，但项目将从列表中移除。'))return;ITEMS=ITEMS.filter(i=>i.key!==key);saveItems();showToast('已删除「'+label+'」')}
function toggleEdit(){EDIT_MODE=!EDIT_MODE;const btn=document.getElementById('editBtn');btn.textContent=EDIT_MODE?'完成':'编辑';btn.classList.toggle('editing',EDIT_MODE);renderItems()}
const EMOJIS="🏋️ 💧 📚 😴 🐕 🥐 📖 🎯 💪 🏃 🧘 🎨 🎵 🖋️ 📷 🎮 🧹 🌱 ❤️ 🎉 🔥 ⚡ ☕ 🍎 🥗 🍳 🏡 🎬 ✈️ 🛒 🧠 💼 🌿 🎵 🎸".split(" ");
function showAddDialog(){document.getElementById('dialogName').value='';document.getElementById('dialogConfirm').disabled=true;document.getElementById('addDialog').classList.add('show');const g=document.getElementById('emojiGrid');g.innerHTML='';EMOJIS.forEach(e=>{const el=document.createElement('span');el.className='emoji-opt';el.textContent=e;el.onclick=()=>{document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');onDialogInput()};g.appendChild(el)});setTimeout(()=>document.getElementById('dialogName').focus(),100)}
function closeAddDialog(){document.getElementById('addDialog').classList.remove('show')}
function onDialogInput(){const name=document.getElementById('dialogName').value.trim();document.getElementById('dialogConfirm').disabled=!name}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2500)}
function showLoading(m){document.getElementById('loadingText').textContent=m||'同步中...';document.getElementById('loadingOverlay').classList.add('show')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}
const STORAGE_KEY="checkin_records_v2";let records=[];try{records=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch(e){}
let calYear,calMonth;
function pad(n){return String(n).padStart(2,"0")}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function fmtTime(d){return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())}
function getDay(ds){return records.find(r=>r.date===ds)||null}
function ensureToday(){const ds=todayStr();let d=getDay(ds);if(!d){d={date:ds,checks:{}};records.push(d)}return d}
function toggleItem(key){
  const day=ensureToday();
  if(day.checks[key]){delete day.checks[key]}else{day.checks[key]=fmtTime(new Date())}
  save();const runner=document.getElementById('dogRunner');runner.classList.remove('happy');void runner.offsetWidth;runner.classList.add('happy');
  const msgs=['边牧为你点赞！🐾','好棒，继续坚持！','今天也超棒！','加油加油！✧'];
  document.getElementById('dogGreeting').innerHTML='<span style="color:#3b6eff;font-weight:600">'+msgs[Math.floor(Math.random()*msgs.length)]+'</span>';
  clearTimeout(window._greetTimer);window._greetTimer=setTimeout(()=>{
    const n=new Date().getHours();let t='今天也要加油哟';
    if(n<6)t='这么早！边牧都惊了 🐶';else if(n<9)t='早安！新的一天开始啦 ☀️';else if(n<12)t='上午好，保持专注！';else if(n<14)t='午休时间到，休息一下~';else if(n<18)t='下午继续努力！';else t='晚上好，今天辛苦啦 🌙';
    document.getElementById('dogGreeting').innerHTML=t+' <span style="color:#3b6eff;font-weight:600">🐾</span>'
  },2500);showDayDetail(todayStr())
}
function renderAll(){renderItems();calcStats();renderCal();renderRecords()}
function renderItems(){
  const day=getDay(todayStr());const grid=document.getElementById('itemsGrid');grid.innerHTML='';let count=0;
  ITEMS.forEach(item=>{
    const checked=day&&day.checks[item.key];if(checked)count++;
    const btn=document.createElement('button');btn.className='item-btn'+(checked?' checked':'');btn.innerHTML='<span class="item-icon">'+item.icon+'</span>'+item.label;
    if(EDIT_MODE){const del=document.createElement('span');del.className='item-del show';del.textContent='✕';del.onclick=e=>{e.stopPropagation();deleteItem(item.key,item.label)};btn.appendChild(del)}

  });

  const t=ITEMS.length;document.getElementById('itemsProgress').textContent=count+' / '+t;document.getElementById('statDay').textContent=count+'/'+t;
}
function updateClock(){const d=new Date();const w=['日','一','二','三','四','五','六'];document.getElementById('clockDate').textContent=d.getFullYear()+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日 星期'+w[d.getDay()];document.getElementById('clockHour').textContent=pad(d.getHours());document.getElementById('clockMin').textContent=pad(d.getMinutes());document.getElementById('clockSec').textContent=pad(d.getSeconds())}
updateClock();setInterval(updateClock,1000);
function calcStats(){
  const cc=records.reduce((s,d)=>s+Object.keys(d.checks).length,0);document.getElementById('statTotal').textContent=cc;
  let streak=0;const d=new Date();d.setDate(d.getDate()-1);const td=getDay(todayStr());
  if(td&&Object.keys(td.checks).length===ITEMS.length)streak=1;
  while(true){const ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());const day=getDay(ds);if(day&&Object.keys(day.checks).length===ITEMS.length){if(!(streak===1&&ds===todayStr()))streak++}else break;d.setDate(d.getDate()-1)}
  document.getElementById('statStreak').textContent=streak;
}
function initCal(){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();renderCal()}
function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCal()}

function renderCal(){document.getElementById('calTitle').textContent=calYear+' 年 '+(calMonth+1)+' 月';const g=document.getElementById('calGrid');g.innerHTML='';['日','一','二','三','四','五','六'].forEach(w=>{const e=document.createElement('div');e.className='cal-weekday';e.textContent=w;g.appendChild(e)});const first=new Date(calYear,calMonth,1).getDay(),days=new Date(calYear,calMonth+1,0).getDate(),today=todayStr(),pdays=new Date(calYear,calMonth,0).getDate();for(let i=first-1;i>=0;i--){const e=document.createElement('div');e.className='cal-day other';e.textContent=pdays-i;g.appendChild(e)};const ti=ITEMS.length;for(let d=1;d<=days;d++){const ds=calYear+'-'+pad(calMonth+1)+'-'+pad(d);const day=getDay(ds);const e=document.createElement('div');e.className='cal-day';if(ds===today)e.classList.add('today');const n=day?Object.keys(day.checks).length:0;if(n>0&&EDIT_MODE==false){e.classList.add('has-check');e.onclick=()=>showDayDetail(ds)};if(ds===today)e.onclick=()=>showDayDetail(ds);const txt=document.createElement('span');txt.textContent=d;e.appendChild(txt);if(n>0){const bar=document.createElement('div');bar.className='cal-bar';for(let i=0;i<ti;i++){const dot=document.createElement('span');dot.className='cal-dot'+(i>=n?' empty':'');bar.appendChild(dot)}e.appendChild(bar)};g.appendChild(e)};const r=(7-g.children.length%7)%7;for(let i=1;i<=r;i++){const e=document.createElement('div');e.className='cal-day other';e.textContent=i;g.appendChild(e)}}
function showDayDetail(dateStr){
  const day=getDay(dateStr);document.getElementById('dayDetailDate').textContent=dateStr;
  const container=document.getElementById('dayDetailItems');container.innerHTML='';const allKeys=new Set();
  if(day)Object.keys(day.checks).forEach(k=>allKeys.add(k));
  ITEMS.forEach(item=>{if(allKeys.has(item.key))allKeys.delete(item.key);const checked=day&&day.checks[item.key];const el=document.createElement('div');el.className='day-detail-item'+(checked?' checked':' missed');el.innerHTML='<span class="dd-label">'+item.icon+' '+item.label+'</span><span class="dd-status">'+(checked?'✅ '+day.checks[item.key]:'❌')+'</span>';container.appendChild(el)});
  allKeys.forEach(k=>{const el=document.createElement('div');el.className='day-detail-item checked';el.innerHTML='<span class="dd-label">'+k+'</span><span class="dd-status">✅ '+(day?day.checks[k]:'')+'</span>';container.appendChild(el)});

(function(){
var audio=null,isPlaying=false,url=null;

function genWav(){
  var sr=44100;
  var notes=[261.63,329.63,392.00,523.25,392.00,329.63,261.63,293.66,349.23,440.00,523.25,440.00,349.23,293.66,261.63,392.00,440.00,392.00,329.63,293.66,261.63];
  var durs=[0.35,0.35,0.35,0.55,0.25,0.25,0.55,0.35,0.35,0.35,0.55,0.25,0.25,0.55,0.25,0.25,0.25,0.25,0.25,0.25,0.50];
  var total=0;durs.forEach(function(d){total+=d});
  var len=Math.floor(sr*total);
  var buf=new ArrayBuffer(44+len*2);
  var v=new DataView(buf);
  function w(s,p){for(var i=0;i<s.length;i++)v.setUint8(p+i,s.charCodeAt(i))}
  w("RIFF",0);v.setUint32(4,36+len*2,true);w("WAVE",8);
  w("fmt ",12);v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  w("data",36);v.setUint32(40,len*2,true);
  var off=0;
  for(var i=0;i<notes.length;i++){
    var f=notes[i],dur=durs[i],samples=Math.floor(sr*dur);
    for(var s=0;s<samples;s++){
      var t=s/sr,env=Math.exp(-2.5*t/dur),val=Math.sin(2*Math.PI*f*t)*env*0.3;
      var samp=Math.max(-1,Math.min(1,val));
      v.setInt16(44+off*2,samp<0?samp*32768:samp*32767,true);
      off++;
    }
  }
  return URL.createObjectURL(new Blob([buf],{type:"audio/wav"}));
}

window.toggleMusic=function(){
  if(isPlaying){
    if(audio){audio.pause()}
    isPlaying=false;
  }else{
    if(!audio){url=genWav();audio=new Audio(url);audio.loop=true;audio.volume=0.3}
    audio.currentTime=0;
    audio.play().catch(function(){});
    isPlaying=true;
  }
  var b=document.getElementById("musicBtn");
  if(b){b.innerHTML=isPlaying?"\uD83C\uDFB5":"\uD83D\uDD07";b.className="music-btn"+(isPlaying?" playing":" muted")}
};

  }
},3500);
})();
